<section class="hero">
  <div class="hero-img-bg">
    <img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=900" alt="" class="hero-photo" />
    <div class="hero-gradient"></div>
  </div>

  <div class="hero-content">
    <div class="hero-badge">🏆 COMPETENCIA OFICIAL 2026 🏆</div>

    <img src="../../../../../assets/img/LOGO 4.png" alt="Cookie Fest" class="hero-logo" onerror="this.style.display='none'" />

    <div class="hero-divider">
      <span class="line"></span>
      <span class="year">2026</span>
      <span class="line"></span>
    </div>

    <p class="hero-tagline">¡LA BATALLA DE LAS GALLETAS!</p>
    <p class="hero-sub">Vota por tu favorita y corona al campeón del año</p>

    <button class="hero-register-btn" (click)="registerClick.emit()">
      REGÍSTRATE PARA DEJAR TU VOTO
    </button>

    <div class="competitors-box">
      <h2>COMPETIDORES</h2>
      <p>Vota por tu galleta favorita y ayuda a definir al campeón</p>
    </div>
  </div>
</section>
